<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Aspirantes</title>
</head>
<body>

    <!-- ADMINISTRADOR DE ASPIRANTES -->

    <!-- Mensaje de confirmación (se muestra al redirigir desde el evaluador) -->
        <div id="mensajeConfirmacion" style="display: none; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 15px; margin: 15px; border-radius: 5px; text-align: center; font-weight: bold;">
        </div>

    <!-- Creamos una Sección donde Escogemos las tablas Solicitadas -->
        <section id="concurso" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">

    <!-- Título de donde se escoge que tabla ver -->
        <h2>Administrar Concurso de Aspirantes</h2>

    <!-- Botones Para actualizar las entragas -->
        <button id="concurso_btVerEntregas"><strong> Ver Entregras </strong></button>

    <!-- Cierre de la Sección -->
        </section>

    <!-- Creamos una Sección donde vamos a ver las tablas Solicitadas  -->
        <section id="entregas" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; margin: auto">
            
        <!-- Título donde vemos la tabla de Puntuación de cada Aspirante -->
            <h2 style="text-align: center;">Entregas del Aspirante</h2>

        <!-- Div donde Colocaremos la tabla -->
            <div>

                <table style="text-align: center; width: 100%;" border="1">
                    <thead> <!-- thead: Encabezado de tabla -->
                        <tr> <!-- tr: Fila de la tabla y th: Columna de la tabla -->
                            <th style="margin: auto">Aspirantes</th> 
                            <th style="margin: auto">Cedulas</th>
                            <th style="margin: auto">Postragrado(CO5) 35pts</th>
                            <th style="margin: auto">Pregrado(CO5.1) 30pts</th>
                            <th style="margin: auto">Producción(CO5.2) 15pts</th>
                            <th style="margin: auto">Meritos(CO5.3) 20pts</th>
                            <th style="margin: auto">Total Obtenido sobre 100pts</th>
                            <th style="margin: auto">Calificación Final sobre 20pts</th>
                        </tr>
                    </thead>
                    
                    <tbody id="entregas_tblRegistros"></tbody> <!-- tbody: Cuerpo de tabla -->
                </table>

            </div>

        <!-- br: Es un espacio de por medio entre apartados -->
            <br>

        <!-- Boton para Recargar la pagina y ver si hay mas aspirantes -->
            <div style="text-align: center;">
                <button id="entregas_btVolver" style="margin-top: 10px;"><strong> Volver </strong></button>
                <button id="entregas_btRecargar"><strong> Recargar </strong></button>
            </div>
        
    <!-- Cierre de Sección -->
        </section>

    <!-- Importamos Los Archivos Js -->
        <script type="module">

            import Cl_cConcurso from "../dist/controllers/Cl_cConcurso.js";
            import Cl_vConcurso from "../dist/views/Cl_vConcurso.js";

            // Mostrar mensaje de confirmación si viene del evaluador
            const mensaje = sessionStorage.getItem("mensajeConcurso");
            if (mensaje) {
                const divMensaje = document.getElementById("mensajeConfirmacion");
                if (divMensaje) {
                    divMensaje.textContent = mensaje;
                    divMensaje.style.display = "block";
                }
                // Limpiar para que no se muestre al recargar
                sessionStorage.removeItem("mensajeConcurso");
            }

            const vConcurso = new Cl_vConcurso();

            new Cl_cConcurso({ vista: vConcurso });

        </script>
        
</body>
</html>
